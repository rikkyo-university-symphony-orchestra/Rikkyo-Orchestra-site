media:
  input: assets
  output: assets
  extensions: [jpg, jpeg, png, gif, avif, webp, JPG, JPEG, PNG, GIF, AVIF, WEBP]
  rename: safe

settings:
  hide: true
  commit:
    identity: app

content:
  - name: news
    label: 新着情報
    type: collection
    path: content/news
    filename: "{year}-{month}-{day}-{title}.md"
    view:
      fields: [title, date, category]
      primary: title
      sort: [date]
      default:
        sort: date
        order: desc
    fields:
      - name: title
        label: タイトル
        type: string
        required: true
        options:
          minlength: 2
          maxlength: 120
      - name: date
        label: 公開日
        type: date
        required: true
        options:
          format: yyyy-MM-dd
      - name: dateLabel
        label: 日付の表示
        type: string
        required: true
        options:
          maxlength: 40
      - name: category
        label: カテゴリー
        type: string
        required: true
        options:
          maxlength: 30
      - name: excerpt
        label: 一覧の説明文
        type: text
        required: true
        options:
          minlength: 10
          maxlength: 240
      - name: images
        label: 記事画像
        type: image
        options:
          multiple:
            max: 8
          unique: true
          extensions: [jpg, jpeg, png, gif, avif, webp, JPG, JPEG, PNG, GIF, AVIF, WEBP]
          rename: safe
      - name: body
        label: 本文
        type: rich-text
        required: true
        options:
          extensions: [jpg, jpeg, png, gif, avif, webp, JPG, JPEG, PNG, GIF, AVIF, WEBP]
          rename: safe

  - name: concerts
    label: 公演情報
    type: collection
    path: content/concerts
    format: json
    filename: "{fields.date}-{fields.title}.json"
    view:
      fields: [title, date, venue, year]
      primary: title
      sort: [date, year]
      search: [title, venue, conductor, program]
      default:
        sort: date
        order: desc
    fields:
      - name: title
        label: 公演名
        type: string
        required: true
        options:
          minlength: 2
          maxlength: 140
      - name: date
        label: 開催日
        type: date
        required: true
        description: この日付を基準に、最新公演と過去公演へ自動で振り分けます。
        options:
          format: yyyy-MM-dd
      - name: dateLabel
        label: 日付の表示
        type: string
        required: true
        options:
          maxlength: 60
      - name: time
        label: 開場・開演時間
        type: string
        options:
          maxlength: 80
      - name: venue
        label: 会場
        type: string
        required: true
        options:
          maxlength: 120
      - name: year
        label: 年度
        type: number
        required: true
        options:
          min: 1919
          max: 2100
      - name: conductor
        label: 指揮
        type: text
        options:
          maxlength: 300
      - name: performers
        label: 出演
        type: string
        list: true
      - name: program
        label: 曲目
        type: string
        list: true
      - name: ticketInfo
        label: チケット情報
        type: string
        list: true
        description: チケットの値段と発売日を入力してください。
      - name: note
        label: 備考
        type: text
        options:
          maxlength: 500
      - name: image
        label: チラシ・公演画像
        type: image
        options:
          extensions: [jpg, jpeg, png, gif, avif, webp, JPG, JPEG, PNG, GIF, AVIF, WEBP]
          rename: safe
      - name: imageAlt
        label: 画像の説明
        type: string
        options:
          maxlength: 160
      - name: ticketUrl
        label: チケットURL
        type: string
        required: false
        pattern:
          regex: "^(https://.+)?$"
          message: https:// から始まる安全なURLを入力してください。
        options:
          maxlength: 500
  - name: recruitment
    label: 新歓情報
    type: collection
    path: content/recruitment
    format: json
    filename: "{fields.year}.json"
    view:
      fields: [year, status, published]
      primary: year
      sort: [year]
      default:
        sort: year
        order: desc
    fields:
      - name: year
        label: 募集年度
        type: number
        required: true
        options:
          min: 2020
          max: 2100
      - name: published
        label: 公開する
        type: boolean
        default: false
      - name: status
        label: 募集状況
        type: select
        required: true
        options:
          values:
            - name: preparing
              label: 準備中
            - name: open
              label: 受付中
            - name: closed
              label: 受付終了
      - name: headline
        label: 見出し
        type: string
        required: true
        options:
          maxlength: 120
      - name: intro
        label: 紹介文
        type: text
        required: true
        options:
          maxlength: 500
      - name: requirements
        label: 募集要項
        type: object
        required: true
        list:
          min: 1
          max: 8
          collapsible:
            collapsed: true
            summary: "{title}"
        fields:
          - name: title
            label: 項目名
            type: string
            required: true
            options:
              maxlength: 80
          - name: description
            label: 説明
            type: text
            required: true
            options:
              maxlength: 500
      - name: events
        label: 新歓日程
        type: object
        list:
          max: 20
          collapsible:
            collapsed: true
            summary: "{dateLabel} {title}"
        fields:
          - name: date
            label: 開催日
            type: date
            required: true
            options:
              format: yyyy-MM-dd
          - name: dateLabel
            label: 日付の表示
            type: string
            required: true
            options:
              maxlength: 60
          - name: title
            label: イベント名
            type: string
            required: true
            options:
              maxlength: 100
          - name: description
            label: 詳細
            type: text
            required: true
            options:
              maxlength: 500
      - name: scheduleMessage
        label: 日程がない場合の案内
        type: text
        required: true
        options:
          maxlength: 300
      - name: flyer
        label: 新歓チラシ
        type: image
        options:
          extensions: [jpg, jpeg, png, gif, avif, webp, JPG, JPEG, PNG, GIF, AVIF, WEBP]
          rename: safe
      - name: flyerAlt
        label: チラシ画像の説明
        type: string
        options:
          maxlength: 160
      - name: lineUrl
        label: 新歓公式LINE URL
        type: string
        pattern:
          regex: "^(https://.+)?$"
          message: https:// から始まる安全なURLを入力してください。
        options:
          maxlength: 500
      - name: lineLabel
        label: LINEボタンの表示
        type: string
        required: true
        options:
          maxlength: 60
      - name: lineDescription
        label: LINEの案内文
        type: text
        required: true
        options:
          maxlength: 500
      - name: contactUrl
        label: 問い合わせ先URL
        type: string
        required: true
        pattern:
          regex: "^(?:https://.+|[a-z0-9_-]+\\.html(?:#[a-zA-Z0-9_-]+)?)$"
          message: https:// のURL、または contact.html のようなサイト内URLを入力してください。
        options:
          maxlength: 500
      - name: contactLabel
        label: 問い合わせボタンの表示
        type: string
        required: true
        options:
          maxlength: 60
