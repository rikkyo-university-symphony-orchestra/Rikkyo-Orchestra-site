media:
  input: assets
  output: assets
  extensions: [jpg, jpeg, apng, png, gif, svg, ico, avif, bmp, tif, tiff, webp, JPG, JPEG, APNG, PNG, GIF, SVG, ICO, AVIF, BMP, TIF, TIFF, WEBP]
  rename: safe

content:
  - name: news
    label: 新着情報
    type: collection
    path: content/news
    filename: "{year}-{month}-{day}-{title}.md"
    view:
      fields: [title, date, category]
      primary: title
      sort: [date]
      default:
        sort: date
        order: desc
    fields:
      - name: title
        label: タイトル
        type: string
        required: true
      - name: date
        label: 公開日
        type: date
        required: true
      - name: dateLabel
        label: 日付の表示
        type: string
        required: true
      - name: category
        label: カテゴリー
        type: string
        required: true
      - name: excerpt
        label: 一覧の説明文
        type: text
        required: true
      - name: images
        label: 記事画像
        type: image
        options:
          multiple:
            max: 8
          unique: true
          extensions: [jpg, jpeg, png, webp, JPG, JPEG, PNG, WEBP]
          rename: true
      - name: body
        label: 本文
        type: rich-text
        required: true
        options:
          extensions: [jpg, jpeg, apng, png, gif, svg, ico, avif, bmp, tif, tiff, webp, JPG, JPEG, APNG, PNG, GIF, SVG, ICO, AVIF, BMP, TIF, TIFF, WEBP]
          rename: safe

  - name: concerts
    label: 公演情報
    type: collection
    path: content/concerts
    format: json
    filename: "{fields.date}-{fields.title}.json"
    view:
      fields: [title, date, venue, year]
      primary: title
      sort: [date, year]
      search: [title, venue, conductor, program]
      default:
        sort: date
        order: desc
    fields:
      - name: title
        label: 公演名
        type: string
        required: true
      - name: date
        label: 開催日
        type: date
        description: この日付を基準に、最新公演と過去公演へ自動で振り分けます。
      - name: dateLabel
        label: 日付の表示
        type: string
        required: true
      - name: time
        label: 開場・開演時間
        type: string
      - name: venue
        label: 会場
        type: string
        required: true
      - name: year
        label: 年度
        type: number
        required: true
      - name: conductor
        label: 指揮
        type: text
      - name: performers
        label: 出演
        type: string
        list: true
      - name: program
        label: 曲目
        type: string
        list: true
      - name: ticketInfo
        label: チケット情報
        type: string
        list: true
      - name: note
        label: 備考
        type: text
      - name: image
        label: チラシ・公演画像
        type: image
      - name: imageAlt
        label: 画像の説明
        type: string
      - name: imageClass
        label: 画像調整用クラス
        type: string
      - name: ticketUrl
        label: チケットURL
        type: string
      - name: ticketLabel
        label: チケットボタンの表示
        type: string

  - name: recruitment
    label: 新歓情報
    type: collection
    path: content/recruitment
    format: json
    filename: "{fields.year}.json"
    view:
      fields: [year, status, published]
      primary: year
      sort: [year]
      default:
        sort: year
        order: desc
    fields:
      - name: year
        label: 募集年度
        type: number
        required: true
      - name: published
        label: 公開する
        type: boolean
        default: false
      - name: status
        label: 募集状況
        type: select
        required: true
        options:
          values:
            - name: preparing
              label: 準備中
            - name: open
              label: 受付中
            - name: closed
              label: 受付終了
      - name: headline
        label: 見出し
        type: string
        required: true
      - name: intro
        label: 紹介文
        type: text
        required: true
      - name: requirements
        label: 募集要項
        type: object
        list:
          min: 1
          max: 8
          collapsible:
            collapsed: true
            summary: "{title}"
        fields:
          - name: title
            label: 項目名
            type: string
            required: true
          - name: description
            label: 説明
            type: text
            required: true
      - name: events
        label: 新歓日程
        type: object
        list:
          max: 20
          collapsible:
            collapsed: true
            summary: "{dateLabel} {title}"
        fields:
          - name: date
            label: 開催日
            type: date
            required: true
          - name: dateLabel
            label: 日付の表示
            type: string
            required: true
          - name: title
            label: イベント名
            type: string
            required: true
          - name: description
            label: 詳細
            type: text
            required: true
      - name: scheduleMessage
        label: 日程がない場合の案内
        type: text
        required: true
      - name: flyer
        label: 新歓チラシ
        type: image
        options:
          extensions: [jpg, jpeg, png, webp]
          rename: true
      - name: flyerAlt
        label: チラシ画像の説明
        type: string
      - name: lineUrl
        label: 新歓公式LINE URL
        type: string
      - name: lineLabel
        label: LINEボタンの表示
        type: string
        required: true
      - name: lineDescription
        label: LINEの案内文
        type: text
        required: true
      - name: contactUrl
        label: 問い合わせ先URL
        type: string
        required: true
      - name: contactLabel
        label: 問い合わせボタンの表示
        type: string
        required: true
