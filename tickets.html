<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="立教大学交響楽団のチケット案内ページです。" />
    <title>チケットについて | 立教大学交響楽団</title>
    <style>html,body{background:#0b0a0d;color:#f2ece2;}</style>
    <link rel="stylesheet" href="styles.css?v=20260717-6" />
  </head>
  <body class="subpage-body" data-page="tickets">
    <main class="orchestra-site subpage">
      <div data-site-header></div>
      <section class="subpage-hero reveal" data-reveal>
        <div class="subpage-hero-inner">
          <p class="eyebrow">Tickets</p>
          <h2>チケットについて</h2>
          <p>演奏会チケットのご案内や、販売開始時期・販売窓口に関する情報を掲載します。</p>
        </div>
      </section>
      <section class="section-block reveal" data-reveal>
        <div class="detail-list two-column">
          <article class="detail-card"><h3>販売情報</h3><p>現在、次回演奏会の詳細を準備中です。販売開始時期や価格は決まり次第ご案内いたします。</p></article>
          <article class="detail-card"><h3>購入方法</h3><p>チケット販売サイトのURLや、学内・会場での受取方法などはこのページに追記していきます。</p></article>
        </div>
      </section>
      <section class="section-block reveal" data-reveal>
        <div class="history-card">
          <div>
            <h3>最新の演奏会情報</h3>
            <p>公演の日時・会場・曲目などは、演奏会情報ページとあわせてご確認ください。</p>
          </div>
          <a class="dark-link" href="concerts.html">演奏会情報へ</a>
        </div>
      </section>
      <section class="section-block reveal" data-reveal>
        <div class="form-shell">
          <div class="section-heading">
            <p>Form</p>
            <h2>チケットに関するフォーム</h2>
          </div>
          <form class="inquiry-form" action="#" method="post">
            <div class="form-grid two-column">
              <label class="form-field">
                <span>お名前</span>
                <input type="text" name="name" placeholder="山田 花子" />
              </label>
              <label class="form-field">
                <span>メールアドレス</span>
                <input type="email" name="email" placeholder="example@rikkyo.jp" />
              </label>
            </div>
            <div class="form-grid two-column">
              <label class="form-field">
                <span>ご用件</span>
                <select name="ticket_topic">
                  <option>購入方法について</option>
                  <option>販売開始時期について</option>
                  <option>公演内容について</option>
                  <option>その他</option>
                </select>
              </label>
              <label class="form-field">
                <span>対象公演</span>
                <input type="text" name="concert_name" placeholder="例：第117回定期演奏会" />
              </label>
            </div>
            <label class="form-field">
              <span>内容</span>
              <textarea name="message" rows="7" placeholder="チケットに関するご質問をご記入ください。"></textarea>
            </label>
            <div class="form-actions">
              <button class="primary-link form-submit" type="submit">送信する</button>
              <p class="form-note">現在は見た目のみのフォームです。送信機能はまだ接続していません。</p>
            </div>
          </form>
        </div>
      </section>
      <div data-site-footer></div>
    </main>
    <script src="common-layout.js?v=20260717-4" defer></script>
    <script src="script.js?v=20260717-4" defer></script>
  </body>
</html>
