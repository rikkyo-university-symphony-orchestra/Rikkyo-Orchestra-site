name: Build CMS content

on:
  schedule:
    - cron: "17 3 1 4 *"
  push:
    paths:
      - "content/**"
      - "scripts/build-content.mjs"
      - "package.json"
      - ".pages.yml"
  workflow_dispatch:

permissions: {}

concurrency:
  group: site-content-writer
  cancel-in-progress: false

jobs:
  build:
    if: github.event_name != 'push' || github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22

      - name: Update latest YouTube videos
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: npm run update:youtube

      - name: Generate HTML
        run: npm run build

      - name: Commit generated pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A -- content/videos.json index.html news.html concerts.html concerts-archive.html video-archive.html join.html 'news-*.html'
          git diff --cached --quiet && exit 0
          git commit -m "Build CMS content"
          git pull --rebase origin "$GITHUB_REF_NAME"
          git push
