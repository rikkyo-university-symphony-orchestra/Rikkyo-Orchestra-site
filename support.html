<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="立教大学交響楽団へのご寄付についての案内ページです。" />
    <title>ご寄付について | 立教大学交響楽団</title>
    <style>html,body{background:#140f1b;color:#f2ece2;}</style>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="subpage-body" data-page="support">
    <main class="orchestra-site subpage">
      <div data-site-header></div>
      <section class="subpage-hero reveal" data-reveal>
        <div class="subpage-hero-inner">
          <p class="eyebrow">Support</p>
          <h2>ご寄付について</h2>
          <p>立教大学交響楽団の活動を支えてくださる皆さまへ、ご寄付に関するご案内を掲載しています。</p>
        </div>
      </section>
      <section class="section-block reveal" data-reveal>
        <div class="detail-list two-column">
          <article class="detail-card"><h3>ご寄付の用途</h3><p>演奏会運営、練習環境の整備、楽器運搬や広報活動など、団の継続的な活動のために活用させていただきます。</p></article>
          <article class="detail-card"><h3>ご連絡方法</h3><p>ご寄付をご検討の方は、まずお問い合わせページよりご連絡ください。担当より詳細をご案内いたします。</p></article>
        </div>
      </section>
      <section class="section-block reveal" data-reveal>
        <div class="history-card">
          <div>
            <h3>ご支援のお願い</h3>
            <p>長く続く伝統を未来へつないでいくため、皆さまのご理解とご支援を賜れますと幸いです。</p>
          </div>
          <a class="dark-link" href="contact.html">お問い合わせへ</a>
        </div>
      </section>
      <section class="section-block reveal" data-reveal>
        <div class="form-shell">
          <div class="section-heading">
            <p>Form</p>
            <h2>ご寄付に関するフォーム</h2>
          </div>
          <form class="inquiry-form" action="#" method="post">
            <div class="form-grid two-column">
              <label class="form-field">
                <span>お名前</span>
                <input type="text" name="name" placeholder="山田 花子" />
              </label>
              <label class="form-field">
                <span>メールアドレス</span>
                <input type="email" name="email" placeholder="example@rikkyo.jp" />
              </label>
            </div>
            <div class="form-grid two-column">
              <label class="form-field">
                <span>ご寄付の種別</span>
                <select name="support_type">
                  <option>個人</option>
                  <option>団体・企業</option>
                  <option>相談したい</option>
                </select>
              </label>
              <label class="form-field">
                <span>ご希望時期</span>
                <input type="text" name="timing" placeholder="例：定期演奏会前までに" />
              </label>
            </div>
            <label class="form-field">
              <span>ご相談内容</span>
              <textarea name="message" rows="7" placeholder="ご寄付に関するご質問やご相談内容をご記入ください。"></textarea>
            </label>
            <div class="form-actions">
              <button class="primary-link form-submit" type="submit">送信する</button>
              <p class="form-note">現在は見た目のみのフォームです。送信機能はまだ接続していません。</p>
            </div>
          </form>
        </div>
      </section>
      <div data-site-footer></div>
    </main>
    <script src="common-layout.js"></script>
    <script src="https://unpkg.com/gsap@3.6.1/dist/gsap.min.js"></script>
    <script src="scrolltrigger.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
