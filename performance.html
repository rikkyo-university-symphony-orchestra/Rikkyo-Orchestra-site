<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; base-uri 'self'; object-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://i.ytimg.com; frame-src https://www.youtube.com https://www.youtube-nocookie.com; connect-src 'self'; form-action 'self' mailto:; upgrade-insecure-requests" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <meta name="description" content="立教大学交響楽団の依頼演奏についての案内ページです。" />
    <title>依頼演奏について | 立教大学交響楽団</title>
    <style>html,body{background:#0b0a0d;color:#f2ece2;}</style>
    <link rel="stylesheet" href="styles.css?v=20260718-16" />
  </head>
  <body class="subpage-body" data-page="performance">
    <main class="orchestra-site subpage">
      <div data-site-header></div>
      <section class="subpage-hero reveal" data-reveal>
        <div class="subpage-hero-inner">
          <p class="eyebrow">Performance Request</p>
          <h2>依頼演奏について</h2>
          <p>式典、催し、記念行事などでの依頼演奏に関するご相談窓口です。</p>
        </div>
      </section>
      <section class="section-block reveal" data-reveal>
        <div class="detail-list two-column">
          <article class="detail-card"><h3>ご相談内容</h3><p>ご希望日時、会場、催しの内容、編成イメージなどを添えてご相談ください。</p></article>
          <article class="detail-card"><h3>お願い</h3><p>団の活動日程との調整が必要となるため、余裕をもってお問い合わせいただけますと幸いです。</p></article>
        </div>
      </section>
      <section class="section-block reveal" data-reveal>
        <div class="history-card">
          <div>
            <h3>まずはご相談ください</h3>
            <p>内容を拝見のうえ、対応可否や編成、条件面について担当よりご連絡いたします。</p>
          </div>
        </div>
      </section>
      <section class="section-block reveal" data-reveal>
        <div class="form-shell">
          <div class="section-heading">
            <p>Form</p>
            <h2>依頼演奏フォーム</h2>
          </div>
          <form class="inquiry-form" action="mailto:rikkyo.univ.symphony@gmail.com" method="post" enctype="text/plain">
            <div class="form-grid two-column">
              <label class="form-field">
                <span>お名前 <em>必須</em></span>
                <input type="text" name="name" autocomplete="name" maxlength="100" placeholder="山田 花子" required />
              </label>
              <label class="form-field">
                <span>メールアドレス <em>必須</em></span>
                <input type="email" name="email" autocomplete="email" maxlength="254" placeholder="example@rikkyo.jp" required />
              </label>
            </div>
            <div class="form-grid two-column">
              <label class="form-field">
                <span>催し名 <em>必須</em></span>
                <input type="text" name="event_name" maxlength="150" placeholder="例：記念式典" required />
              </label>
              <label class="form-field">
                <span>開催希望日 <em>必須</em></span>
                <input type="text" name="desired_date" maxlength="100" placeholder="例：2027年3月上旬" required />
              </label>
            </div>
            <div class="form-grid two-column">
              <label class="form-field">
                <span>会場 <em>必須</em></span>
                <input type="text" name="venue" maxlength="200" placeholder="例：〇〇ホール" required />
              </label>
              <label class="form-field">
                <span>ご希望編成</span>
                <input type="text" name="ensemble" maxlength="150" placeholder="例：弦楽四重奏 / 小編成" />
              </label>
            </div>
            <label class="form-field">
              <span>ご相談内容 <em>必須</em></span>
              <textarea name="message" rows="7" maxlength="3000" placeholder="催しの概要やご希望内容をご記入ください。" required></textarea>
            </label>
            <label class="privacy-consent">
              <input type="checkbox" name="privacy_consent" value="同意する" required />
              <span><a href="privacy.html" target="_blank" rel="noopener">プライバシーポリシー</a>を確認し、個人情報の取り扱いに同意します。<em>必須</em></span>
            </label>
            <div class="form-actions">
              <button class="primary-link form-submit" type="submit">送信する</button>
              <p class="form-note">送信ボタンを押すと、入力内容を含んだメール作成画面が開きます。</p>
            </div>
          </form>
        </div>
      </section>
      <div data-site-footer></div>
    </main>
    <script src="common-layout.js?v=20260718-5" defer></script>
    <script src="script.js?v=20260718-3" defer></script>
  </body>
</html>
